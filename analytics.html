<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welco Analytics</title>
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; }
    .header { background: linear-gradient(90deg, #005f73, #0a9396); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-size: 20px; }
    .header-left p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
    .export-btn { background: white; color: #005f73; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .export-btn:hover { background: #e8f4f4; }
    .container { max-width: 700px; margin: 24px auto; padding: 0 16px 40px; }

    /* Hotel filter */
    .hotel-filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: 2px solid #0a9396; border-radius: 20px; background: white; color: #0a9396; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .filter-btn.active { background: #0a9396; color: white; }

    /* Date filter */
    .date-filter { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .date-btn { padding: 7px 14px; border: 1.5px solid #ddd; border-radius: 20px; background: white; color: #555; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .date-btn.active { border-color: #005f73; background: #005f73; color: white; }
    .date-range-inputs { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .date-range-inputs input { padding: 6px 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 12px; outline: none; }
    .date-range-inputs input:focus { border-color: #0a9396; }
    .date-apply { padding: 6px 14px; background: #0a9396; color: white; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); text-align: center; }
    .stat-number { font-size: 36px; font-weight: bold; color: #0a9396; }
    .stat-label { font-size: 13px; color: #888; margin-top: 4px; }

    .section-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; margin-top: 24px; }

    /* Rating bars */
    .rating-bar { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .rating-bar span { font-size: 13px; width: 20px; color: #555; }
    .bar-bg { flex: 1; background: #eee; border-radius: 4px; height: 8px; }
    .bar-fill { height: 100%; border-radius: 4px; background: #0a9396; transition: width 0.5s; }
    .bar-count { font-size: 12px; color: #888; width: 24px; text-align: right; }

    /* Category breakdown */
    .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .cat-name { font-size: 13px; width: 110px; color: #444; white-space: nowrap; }
    .cat-bar-bg { flex: 1; background: #eee; border-radius: 4px; height: 10px; }
    .cat-bar-fill { height: 100%; border-radius: 4px; background: #005f73; transition: width 0.5s; }
    .cat-count { font-size: 12px; color: #888; width: 30px; text-align: right; }

    /* Reviews */
    .review-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .review-room { font-weight: bold; font-size: 14px; }
    .review-stars { font-size: 16px; }
    .review-comment { color: #555; font-size: 14px; font-style: italic; margin-bottom: 6px; }
    .review-meta { font-size: 12px; color: #aaa; }

    .empty { text-align: center; padding: 32px; color: #aaa; }
    .card-wrap { background: white; border-radius: 14px; padding: 20px; margin-bottom: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    /* Export section */
    .export-section { background: white; border-radius: 14px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .export-info h3 { font-size: 15px; font-weight: bold; color: #1a1a2e; margin-bottom: 4px; }
    .export-info p { font-size: 12px; color: #888; }
    .export-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-excel { padding: 10px 18px; background: #1d6f42; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-excel:hover { background: #155233; }
    .btn-csv { padding: 10px 18px; background: #005f73; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-csv:hover { background: #004d5e; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📊 Welco Analytics</h1>
    <p id="header-sub">Guest feedback & request insights</p>
  </div>
</div>

<div class="container">

  <!-- Hotel Filter -->
  <div class="hotel-filter" id="hotel-filter"></div>

  <!-- Date Filter -->
  <div class="date-filter">
    <button class="date-btn active" onclick="setDateFilter('all', this)">All Time</button>
    <button class="date-btn" onclick="setDateFilter('today', this)">Today</button>
    <button class="date-btn" onclick="setDateFilter('week', this)">This Week</button>
    <button class="date-btn" onclick="setDateFilter('month', this)">This Month</button>
    <div class="date-range-inputs">
      <input type="date" id="date-from" placeholder="From">
      <span style="font-size:12px;color:#888">to</span>
      <input type="date" id="date-to" placeholder="To">
      <button class="date-apply" onclick="applyCustomDate()">Apply</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="total-requests">-</div><div class="stat-label">Total Requests</div></div>
    <div class="stat-card"><div class="stat-number" id="avg-rating">-</div><div class="stat-label">Avg Rating ⭐</div></div>
    <div class="stat-card"><div class="stat-number" id="completed">-</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-number" id="pending-count">-</div><div class="stat-label">Pending</div></div>
  </div>

  <!-- Export Section -->
  <div class="export-section">
    <div class="export-info">
      <h3>📥 Export Reports</h3>
      <p id="export-count">Download all requests as a spreadsheet</p>
    </div>
    <div class="export-btns">
      <button class="btn-excel" onclick="exportExcel()">📊 Excel (.xlsx)</button>
      <button class="btn-csv" onclick="exportCSV()">📄 CSV</button>
    </div>
  </div>

  <!-- Category Breakdown -->
  <div class="section-title">Requests by Category</div>
  <div class="card-wrap">
    <div id="category-bars"></div>
  </div>

  <!-- Rating Breakdown -->
  <div class="section-title">Rating Breakdown</div>
  <div class="card-wrap">
    <div id="rating-bars"></div>
  </div>

  <!-- Recent Reviews -->
  <div class="section-title">Recent Reviews</div>
  <div id="reviews-list"></div>

</div>

<script>
  var allData = [];
  var currentHotel = 'all';
  var currentDateFilter = 'all';
  var customFrom = null;
  var customTo = null;
  var currentFiltered = [];
  var hotelNames = {};

  async function loadData() {
    try {
      // Load hotels for name mapping
      var hotelRes = await fetch('/hotels');
      var hotels = await hotelRes.json();
      if (Array.isArray(hotels)) {
        hotels.forEach(function(h) { hotelNames[h.hotel_id] = h.name; });
      }

      var res = await fetch('/requests');
      var data = await res.json();
      if (Array.isArray(data)) {
        allData = data;
      } else if (data && Array.isArray(data.data)) {
        allData = data.data;
      }
      buildHotelFilter(allData);
      applyFilters();
    } catch(e) {
      console.error(e);
    }
  }

  function buildHotelFilter(data) {
    var hotelIds = ['all', ...new Set(data.map(function(r){ return r.hotel_id; }))];
    var filter = document.getElementById('hotel-filter');
    filter.innerHTML = hotelIds.map(function(h) {
      var label = h === 'all' ? '🌐 All Hotels' : '🏨 ' + (hotelNames[h] || h);
      return '<button class="filter-btn'+(h==='all'?' active':'')+'" onclick="filterHotel(\''+h+'\', this)">'+label+'</button>';
    }).join('');
  }

  function filterHotel(hotel, btn) {
    currentHotel = hotel;
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    applyFilters();
  }

  function setDateFilter(range, btn) {
    currentDateFilter = range;
    customFrom = null; customTo = null;
    document.querySelectorAll('.date-btn').forEach(function(b){ b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    applyFilters();
  }

  function applyCustomDate() {
    var from = document.getElementById('date-from').value;
    var to = document.getElementById('date-to').value;
    if (!from || !to) { alert('Please select both From and To dates.'); return; }
    customFrom = new Date(from);
    customTo = new Date(to);
    customTo.setHours(23,59,59,999);
    currentDateFilter = 'custom';
    document.querySelectorAll('.date-btn').forEach(function(b){ b.classList.remove('active'); });
    applyFilters();
  }

  function applyFilters() {
    var data = allData;

    // Hotel filter
    if (currentHotel !== 'all') {
      data = data.filter(function(r){ return r.hotel_id === currentHotel; });
    }

    // Date filter
    var now = new Date();
    if (currentDateFilter === 'today') {
      var todayStr = now.toDateString();
      data = data.filter(function(r){ return new Date(r.created_at).toDateString() === todayStr; });
    } else if (currentDateFilter === 'week') {
      var weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
      data = data.filter(function(r){ return new Date(r.created_at) >= weekAgo; });
    } else if (currentDateFilter === 'month') {
      var monthAgo = new Date(now); monthAgo.setDate(monthAgo.getDate() - 30);
      data = data.filter(function(r){ return new Date(r.created_at) >= monthAgo; });
    } else if (currentDateFilter === 'custom' && customFrom && customTo) {
      data = data.filter(function(r){
        var d = new Date(r.created_at);
        return d >= customFrom && d <= customTo;
      });
    }

    currentFiltered = data;
    renderDashboard(data);
  }

  function renderDashboard(data) {
    var total = data.length;
    var completed = data.filter(function(r){ return r.status==='done'; }).length;
    var pending = data.filter(function(r){ return r.status==='pending' || r.status==='in_progress'; }).length;
    var rated = data.filter(function(r){ return r.feedback_rating; });
    var avg = rated.length > 0 ? (rated.reduce(function(s,r){ return s+r.feedback_rating; },0)/rated.length).toFixed(1) : '-';

    document.getElementById('total-requests').textContent = total;
    document.getElementById('avg-rating').textContent = avg;
    document.getElementById('completed').textContent = completed;
    document.getElementById('pending-count').textContent = pending;
    document.getElementById('export-count').textContent = total + ' requests ready to export';

    // Category breakdown
    var cats = ['Housekeeping','Room Service','Maintenance','Front Desk'];
    var catCounts = {};
    cats.forEach(function(c){ catCounts[c] = 0; });
    data.forEach(function(r){ if (catCounts[r.category] !== undefined) catCounts[r.category]++; else catCounts['Other'] = (catCounts['Other']||0)+1; });
    var maxCat = Math.max.apply(null, Object.values(catCounts)) || 1;
    var catEmojis = {'Housekeeping':'🛏️','Room Service':'🍽️','Maintenance':'🔧','Front Desk':'🛎️','Other':'📋'};
    document.getElementById('category-bars').innerHTML = Object.entries(catCounts).map(function(entry){
      var cat=entry[0], count=entry[1];
      var pct = (count/maxCat*100);
      return '<div class="cat-row"><span class="cat-name">'+(catEmojis[cat]||'📋')+' '+cat+'</span><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+pct+'%"></div></div><span class="cat-count">'+count+'</span></div>';
    }).join('') || '<div class="empty">No data</div>';

    // Rating bars
    var bars = document.getElementById('rating-bars');
    if (rated.length === 0) {
      bars.innerHTML = '<div class="empty">No ratings yet</div>';
    } else {
      bars.innerHTML = [5,4,3,2,1].map(function(star){
        var count = rated.filter(function(r){ return r.feedback_rating===star; }).length;
        var pct = (count/rated.length*100);
        return '<div class="rating-bar"><span>'+star+'⭐</span><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div><span class="bar-count">'+count+'</span></div>';
      }).join('');
    }

    // Reviews
    var reviews = data.filter(function(r){ return r.feedback_rating; }).sort(function(a,b){ return new Date(b.created_at)-new Date(a.created_at); });
    var list = document.getElementById('reviews-list');
    if (reviews.length === 0) {
      list.innerHTML = '<div class="empty">No reviews yet</div>';
    } else {
      list.innerHTML = reviews.map(function(r){
        var stars = '';
        for(var i=0;i<r.feedback_rating;i++) stars+='⭐';
        var hotelName = hotelNames[r.hotel_id] || r.hotel_id;
        return '<div class="review-card"><div class="review-top"><span class="review-room">Room '+(r.room_number||'-')+' — '+(r.category||'General')+'</span><span class="review-stars">'+stars+'</span></div>'+(r.feedback_comments?'<div class="review-comment">"'+r.feedback_comments+'"</div>':'')+'<div class="review-meta">'+hotelName+' · '+new Date(r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+'</div></div>';
      }).join('');
    }
  }

  /* ─── EXPORT EXCEL ─── */
  function exportExcel() {
    if (currentFiltered.length === 0) { alert('No data to export!'); return; }

    var rows = currentFiltered.map(function(r) {
      return {
        'Date': new Date(r.created_at).toLocaleDateString('en-IN'),
        'Time': new Date(r.created_at).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}),
        'Hotel': hotelNames[r.hotel_id] || r.hotel_id,
        'Room': r.room_number || '-',
        'Category': r.category || 'General',
        'Request': r.message || '-',
        'Status': r.status === 'done' ? 'Completed' : r.status === 'in_progress' ? 'In Progress' : 'Pending',
        'Handled By': r.claimed_by || '-',
        'Rating': r.feedback_rating || '-',
        'Guest Comment': r.feedback_comments || '-',
        'Completed At': r.completed_at ? new Date(r.completed_at).toLocaleString('en-IN') : '-'
      };
    });

    var ws = XLSX.utils.json_to_sheet(rows);

    // Column widths
    ws['!cols'] = [
      {wch:12},{wch:8},{wch:20},{wch:8},{wch:14},{wch:30},
      {wch:12},{wch:14},{wch:8},{wch:30},{wch:20}
    ];

    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Welco Requests');

    // Filename with date
    var today = new Date().toISOString().slice(0,10);
    var hotelLabel = currentHotel === 'all' ? 'All-Hotels' : (hotelNames[currentHotel] || currentHotel).replace(/\s+/g,'-');
    XLSX.writeFile(wb, 'Welco-'+hotelLabel+'-'+today+'.xlsx');
  }

  /* ─── EXPORT CSV ─── */
  function exportCSV() {
    if (currentFiltered.length === 0) { alert('No data to export!'); return; }

    var headers = ['Date','Time','Hotel','Room','Category','Request','Status','Handled By','Rating','Guest Comment','Completed At'];
    var rows = currentFiltered.map(function(r) {
      return [
        new Date(r.created_at).toLocaleDateString('en-IN'),
        new Date(r.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
        hotelNames[r.hotel_id] || r.hotel_id,
        r.room_number || '-',
        r.category || 'General',
        '"'+(r.message||'-').replace(/"/g,"'")+'"',
        r.status==='done'?'Completed':r.status==='in_progress'?'In Progress':'Pending',
        r.claimed_by || '-',
        r.feedback_rating || '-',
        '"'+(r.feedback_comments||'-').replace(/"/g,"'")+'"',
        r.completed_at ? new Date(r.completed_at).toLocaleString('en-IN') : '-'
      ].join(',');
    });

    var csv = [headers.join(','), ...rows].join('\n');
    var blob = new Blob([csv], {type:'text/csv'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    var today = new Date().toISOString().slice(0,10);
    var hotelLabel = currentHotel==='all'?'All-Hotels':(hotelNames[currentHotel]||currentHotel).replace(/\s+/g,'-');
    link.download = 'Welco-'+hotelLabel+'-'+today+'.csv';
    link.click();
  }

  loadData();
</script>
</body>
</html>
