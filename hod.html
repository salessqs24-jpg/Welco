<style>
:root {--brand: #005f73; --brand2:
#0a9396; --ink: #0d1b1e;}
* {margin: 0; padding: 0; box-sizing:
border-box; }
body {font-family: 'Segoe UI', sansserif; background: #f0f2f5 url('https://
images.unsplash.com/
photo-1542314831-068cd1dbfeeb?
w=1600&q=80') center/cover fixed no-
repeat; min-height: 100vh; }
/* LOGIN */
#login-screen {min-height: 100vh;
background: linear-gradient(160deg,
#005f73, #0a9396); display: flex; flexdirection: column; align-items: center;
justify-content: center; padding: 24px; }
.login-card {background: white; borderradius: 20px; padding: 32px; width: 100%;
max-width: 360px; box-shadow: 0 20px
60px rgba(0,0,0,0.2);}
.login-logo {font-size: 44px; text-align:
center; margin-bottom: 8px; }
.login-title {color: white; font-size:
22px; font-weight: 700; text-align: center;
margin-bottom: 4px; }
.login-sub {color:
rgba(255,255,255,0.7); font-size: 13px;
text-align: center; margin-bottom: 28px;}
.lbl {font-size: 11px; color: #888; text-

0.08em; display: block; margin-bottom:
6px; font-weight: 600; }
.login-card input {width: 100%;

14px; margin-bottom: 14px; outline: none;
background: white; }
.login-card input:focus {border-color:
var(--brand2); }
.login-btn { width: 100%; padding: 14px;
background: var(--brand); color: white;
border: none; border-radius: 12px; fontsize: 15px; font-weight: 700; cursor:
pointer; }
.login-btn:hover { background: var(--
brand2); }
.login-err {color: #e63946; font-size:
13px; text-align: center; margin-top: 10px;
display: none;}
.login-note {font-size: 11px; color:
#aaa; text-align: center; margin-top:
12px; line-height: 1.5; }
.hotel-code-hint { background: #e8f4f4;
border-radius: 8px; padding: 10px 14px;
font-size: 12px; color: #005f73; marginbottom: 14px; }
/* APP */
#app-screen {display: none; }
.topbar {background: lineargradient(90deg, var(--brand), var(--
brand2)); color: white; padding: 14px 20px;
display: flex; justify-content: spacebetween; align-items: center; position:
sticky; top: 0; z-index: 50; }
.topbar-left {display: flex; align-items:
center; gap: 12px; }
.topbar-logo {width: 36px; height: 36px;
border-radius: 8px; object-fit: cover;
border: 2px solid rgba(255,255,255,0.4);

.topbar-emoji {font-size: 22px; }
.topbar-name {font-size: 16px; fontweight: 700;}
.topbar-sub {font-size: 11px; opacity:
0.75; margin-top: 1px; }
.topbar-right { display: flex; align-items:
center; gap: 10px; }
.dept-badge {padding: 4px 12px;
border-radius: 20px; font-size: 12px; fontweight: 600; background:
rgba(255,255,255,0.2); }
.logout-btn {background:
rgba(255,255,255,0.15); border: none;
color: white; padding: 6px 14px; borderradius: 8px; font-size: 12px; cursor:
pointer; }
/* ALERT BAR */
.alert-bar {background: #e63946; color:
white; padding: 10px 20px; font-size:
13px; font-weight: 600; text-align: center;
display: none; animation: pulse-bg 2s
infinite;}
@keyframes pulse-bg {0%,100%
{background:#e63946} 50%
{background:#c1121f} }
/* TABS */
.tabs {display: flex; background: white;
border-bottom: 1px solid #eee; overflowx: auto; }
.tab {padding: 13px 18px; font-size:
13px; font-weight: 500; color: #999;
cursor: pointer; white-space: nowrap;
border-bottom: 2px solid transparent; }
.tab.active { color: var(--brand); borderbottom-color: var(--brand); }
/* CONTENT */
.content { padding: 16px; max-width:
900px; margin: 0 auto; padding-bottom:
40px; }
.tab-panel {display: none; }
.tab-panel.active {display: block; }
/* CARDS */
.card {background:
rgba(255,255,255,0.92); border-radius:
14px; padding: 20px; margin-bottom:
16px; box-shadow: 0 4px 20px
rgba(0,0,0,0.12); }
.card-title {font-size: 15px; fontweight: 700; color: var(--ink); marginbottom: 4px; }
.card-sub {font-size: 12px; color: #999;
margin-bottom: 16pх; }
/* STATS */
.stat-row {display: grid; grid-templatecolumns: repeat(4,1fr); gap: 12px; marginbottom: 16px; }
.stat-box {background:
rgba(255,255,255,0.92); border-radius:
12px; padding: 16px; text-align: center;
box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-num {font-size: 32px; fontweight: 700; color: var(--brand2); }
.stat-label {font-size: 11px; color:
#999; text-transform: uppercase; letterspacing: 0.08em; margin-top: 4px; }
/* REQUESTS */
.request-row {padding: 14px 0; borderbottom: 1px solid #fOfOf0; }
.request-row:last-child { borderbottom: none; }
.req-top {display: flex; justify-content:
space-between; align-items: center;
margin-bottom: 6px; }
.req-room {font-weight: 700; font-size:
14px; color: var(--ink); }
.req-cat {color: white; padding: 2px
10px; border-radius: 10px; font-size:
11px; font-weight: 600; }
.req-msg {color: #666; font-size: 13px;
margin-bottom: 6px; line-height: 1.4;}
.req-meta {font-size: 11px; color: #aaa;
display: flex; gap: 10px; flex-wrap: wrap;
align-items: center;}
.badge {padding: 3px 10px; borderradius: 10px; font-size: 11px; font-weight:
600;}
.badge-pending {background: #fff3cd;
color: #8a6000; }
.badge-progress {background: #cff4fc;
color: #0a6070; }
.badge-done {background: #d1fae5;
color: #065f46; }
.sla-warn {background: #fde8ea; color:
#e63946; padding: 2px 8px; borderradius: 6px; font-size: 11px; font-weight:
700; }
.sla-ok {background: #d1fae5; color:
#065f46; padding: 2px 8px; border-radius:
6px; font-size: 11px; }
/* ROOMS */
.rooms-grid { display: grid; gridtemplate-columns: repeat(2,1fr); gap:
10px; }
.room-card {background: #f9f9f9;
border-radius: 10px; padding: 14px; textalign: center; border: 1px solid #eee; }
.room-num {font-size: 20px; fontweight: 700; color: var(--brand); }
.room-floor {font-size: 11px; color:
#aaa; margin-bottom: 8px; }
.btn-del {padding: 6px 10px;
background: #fde8ea; color: #e63946;
border: none; border-radius: 6px; fontsize: 11px; cursor: pointer; }
.add-row {display: flex; gap: 8px; flexwrap: wrap; }
.add-row input {flex: 1; min-width:
80px; padding: 10px 12px; border: 1.5px
solid #e0ddd8; border-radius: 8px; font-
size: 14px; outline: none; }
.btn-add {padding: 10px 18px;
background: var(--brand); color: white;
border: none; border-radius: 8px; fontsize: 13px; font-weight: 700; cursor:
pointer; }
/* STAFF */
.staff-row {display: flex; justifycontent: space-between; align-items:
center; padding: 12px 0; border-bottom:
1px solid #fOfOf0; }
.staff-row:last-child {border-bottom:
none;}
.staff-name-txt {font-size: 14px; fontweight: 500;}
.staff-pin {font-family: monospace;
font-size: 15px; font-weight: 700; color:
var(--brand2); background: #e8f4f4;
padding: 4px 10px; border-radius: 6px; }
.btn-remove {background: #fde8ea;
color: #e63946; border: none; borderradius: 6px; padding: 4px 10px; font-size:
11px; cursor: pointer; }
/* MSG */
.msg-box { padding: 10px 14px; borderradius: 8px; font-size: 13px; marginbottom: 12px; display: none; }
.msg-success {background: #d1fae5;
color: #065f46; display: block; }
/* FILTER */
.filter-row {display: flex; gap: 8px;
margin-bottom: 14px; flex-wrap: wrap; }
select.filter-sel { padding: 8px 12px;
border: 1px solid #ddd; border-radius:
8px; font-size: 13px; outline: none;
background: white; }
/* CHARTS */
.chart-wrap {height: 220px; }
.donut-wrap {position: relative; height:
180px; }
.donut-center {position: absolute; top:
50%; left: 50%; transform:
translate(-50%,-50%); text-align: center;
pointer-events: none; }
.donut-center .big {font-size: 24px;
font-weight: 700; color: var(--ink); }
.donut-center .small {font-size: 10px;
color: #aaa; }
.legend { display: flex; flex-wrap: wrap;
gap: 8px; margin-top: 12px; justifycontent: center; }
.legend-item {display: flex; align-items:
center; gap: 5px; font-size: 11px; color:
#555;}
.legend-dot {width: 9px; height: 9px;
border-radius: 50%; }
/* MAINTENANCE */
.maint-item { padding: 12px 0; border-
bottom: 1px solid #fOfOf0; }
.maint-item:last-child {border-bottom:
none;}
.maint-top {display: flex; justifycontent: space-between; align-items:
flex-start; margin-bottom: 4px; }
.maint-title-txt {font-size: 14px; fontweight: 600; color: var(--ink); }}
.maint-desc-txt {font-size: 12px; color:
#888; margin-bottom: 6px; }
.maint-meta {font-size: 11px; color:
#aaa; display: flex; gap: 8px; flex-wrap:
wrap; align-items: center; }
.due-badge { padding: 2px 8px; borderradius: 6рx; font-size: 11px; font-weight:
600;}
.due-overdue {background: #fde8ea;
color: #e63946; }
.due-today {background: #fff3cd; color:
#8a6000; }
.due-upcoming {background: #d1fae5;
color: #065f46; }
.btn-mark-done {padding: 5px 12px;
background: #2ecc71; color: white;
border: none; border-radius: 6px; fontsize: 11px; cursor: pointer; font-weight:
600; }
.btn-delete-task {padding: 5px 10px;
background: #fde8ea; color: #e63946;
border: none; border-radius: 6px; fontsize: 11px; cursor: pointer; }
.freq-pill { padding: 2px 8px; borderradius: 10px; font-size: 10px; font-weight:
600;}
.freq-daily { background: #e8f4f4; color:
#005f73; }
.freq-weekly {background: #fff8e6;
color: #8a6000; }
.freq-monthly {background: #f0e8ff;
color: #6b21a8;}
.empty {text-align: center; padding:
32px; color: #aaa; font-size: 14px; }
.loading {text-align: center; padding:
24px; color: #aaa; }
@media (max-width: 600px) {
.stat-row {grid-template-columns: 1fr
1fr;}
.rooms-grid {grid-template-columns:
1fr 1fr; }
}
</style>
</head>
