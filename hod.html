<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welco HOD</title>

  <style>
    :root { --brand: #005f73; --brand2: #0a9396; --ink: #0d1b1e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5 url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=1600&q=80') center/cover fixed no-repeat; min-height: 100vh; }

    /* LOGIN */
    #login-screen { min-height: 100vh; background: linear-gradient(160deg, #005f73, #0a9396); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .login-logo { font-size: 44px; text-align: center; margin-bottom: 8px; }
    .login-title { color: white; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .login-sub { color: rgba(255,255,255,0.7); font-size: 13px; text-align: center; margin-bottom: 28px; }
    .lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; font-weight: 600; }
    .login-card input { width: 100%; padding: 12px 14px; border: 1.5px solid #e0ddd8; border-radius: 10px; font-size: 14px; margin-bottom: 14px; outline: none; background: white; }
    .login-card input:focus { border-color: var(--brand2); }
    .login-btn { width: 100%; padding: 14px; background: var(--brand); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-btn:hover { background: var(--brand2); }
    .login-err { color: #e63946; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
    .login-note { font-size: 11px; color: #aaa; text-align: center; margin-top: 12px; line-height: 1.5; }
    .hotel-code-hint { background: #e8f4f4; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #005f73; margin-bottom: 14px; }

    /* APP */
    #app-screen { display: none; }
    .topbar { background: linear-gradient(90deg, var(--brand), var(--brand2)); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); display: none; }
    .topbar-emoji { font-size: 22px; }
    .topbar-name { font-size: 16px; font-weight: 700; }
    .topbar-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .dept-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: rgba(255,255,255,0.2); }
    .logout-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; }

    /* ALERT BAR */
    .alert-bar { background: #e63946; color: white; padding: 10px 20px; font-size: 13px; font-weight: 600; text-align: center; display: none; animation: pulse-bg 2s infinite; }
    @keyframes pulse-bg { 0%,100%{background:#e63946} 50%{background:#c1121f} }

    /* TABS */
    .tabs { display: flex; background: white; border-bottom: 1px solid #eee; overflow-x: auto; }
    .tab { padding: 13px 18px; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); }

    /* CONTENT */
    .content { padding: 16px; max-width: 900px; margin: 0 auto; padding-bottom: 40px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
