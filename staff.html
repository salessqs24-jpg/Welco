<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welco Staff</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a9396">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Welco Staff">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1257/1257163.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; min-height: 100vh; }
    #login-screen {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a9396, #005f73);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .hotel-logo { font-size: 48px; margin-bottom: 8px; }
    .hotel-name { color: white; font-size: 22px; font-weight: bold; margin-bottom: 4px; }
    .hotel-sub { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 32px; }
    .login-card { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 340px; }
    .login-card label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    .login-card select, .login-card input[type="text"] {
      width: 100%; padding: 12px; border: 1px solid #ddd;
      border-radius: 10px; font-size: 15px; margin-bottom: 20px;
    }
    .pin-label { font-size: 13px; color: #666; margin-bottom: 10px; }
    .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
    .pin-dot.filled { background: #0a9396; }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .pin-btn { padding: 16px; border: none; border-radius: 12px; background: #f5f5f5; font-size: 18px; font-weight: bold; cursor: pointer; }
    .pin-btn:active { background: #0a9396; color: white; }
    .pin-clear { background: #ffe0e0; color: #e63946; }
    .login-btn { width: 100%; padding: 14px; background: #0a9396; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-error { color: #e63946; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
    #dashboard-screen { display: none; }
    .dash-header { background: linear-gradient(90deg, #0a9396, #005f73); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .dash-hotel { font-size: 16px; font-weight: bold; }
    .dash-staff { font-size: 13px; opacity: 0.8; }
    .notif-badge { background: #ee9b00; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .dash-container { padding: 16px; max-width: 500px; margin: 0 auto; }
    .section-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .task-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 4px solid #ee9b00; }
    .task-card.urgent { border-left-color: #e63946; }
    .task-card.done { border-left-color: #2ecc71; opacity: 0.6; }
    .task-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .task-room { font-weight: bold; font-size: 15px; }
    .task-cat { background: #005f73; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    .task-msg { color: #555; font-size: 14px; margin-bottom: 8px; }
    .task-sla { font-size: 12px; color: #888; margin-bottom: 8px; }
    .task-sla span { color: #e63946; font-weight: bold; }
    .timer-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 10px; }
    .timer-fill { height: 100%; border-radius: 4px; background: #2ecc71; transition: width 0.5s; }
    .timer-fill.warning { background: #ee9b00; }
    .timer-fill.urgent { background: #e63946; }
    .accept-btn { padding: 9px 20px; background: #ee9b00; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .accept-btn:disabled { background: #ccc; cursor: default; }
    .empty-state { text-align: center; padding: 48px 20px; color: #aaa; }
    .logout-btn { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 13px; cursor: pointer; }

    /* Install banner */
    #install-banner {
      display: none;
      background: #005f73; color: white;
      padding: 12px 16px;
      display: none; align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    #install-banner button {
      background: white; color: #005f73;
      border: none; border-radius: 8px;
      padding: 6px 14px; font-weight: bold;
      cursor: pointer; font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- INSTALL BANNER (Android) -->
  <div id="install-banner">
    <span>📲 Install Welco Staff as an app</span>
    <button onclick="installApp()">Install</button>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="hotel-logo">🏨</div>
    <div class="hotel-name" id="login-hotel-name">Welco</div>
    <div class="hotel-sub" id="login-hotel-sub">Staff Portal</div>
    <div class="login-card">
      <label>Your Hotel</label>
      <select id="hotel-select" onchange="switchHotel(this.value)">
        <option value="hotel_001">🏰 DownTown — Udaipur</option>
        <option value="hotel_002">🏯 BambooSaa — Pushkar</option>
      </select>
      <label>Your Name</label>
      <input type="text" id="staff-name" placeholder="e.g. Rahul">
      <div class="pin-label">Enter PIN</div>
      <div class="pin-dots">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-btn" onclick="addPin('1')">1</button>
        <button class="pin-btn" onclick="addPin('2')">2</button>
        <button class="pin-btn" onclick="addPin('3')">3</button>
        <button class="pin-btn" onclick="addPin('4')">4</button>
        <button class="pin-btn" onclick="addPin('5')">5</button>
        <button class="pin-btn" onclick="addPin('6')">6</button>
        <button class="pin-btn" onclick="addPin('7')">7</button>
        <button class="pin-btn" onclick="addPin('8')">8</button>
        <button class="pin-btn" onclick="addPin('9')">9</button>
        <button class="pin-btn pin-clear" onclick="clearPin()">✕</button>
        <button class="pin-btn" onclick="addPin('0')">0</button>
        <button class="pin-btn" onclick="deletePin()">⌫</button>
      </div>
      <button class="login-btn" onclick="doLogin()">Login</button>
      <div class="login-error" id="login-error">Wrong PIN. Try 1234</div>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboard-screen">
    <div class="dash-header" id="dash-header">
      <div>
        <div class="dash-hotel" id="dash-hotel">Welco Staff</div>
        <div class="dash-staff" id="dash-staff">Staff</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="notif-badge" id="pending-count">0 pending</span>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="dash-container">
      <div class="section-label">Live Requests</div>
      <div id="task-list"></div>
    </div>
  </div>

  <script>
    const CORRECT_PIN = '1234';
    let pin = '';
    let loggedInStaff = '';
    let currentHotelId = 'hotel_001';
    let knownRequestIds = null;
    let deferredPrompt = null;

    // ── PWA Install ──
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'flex';
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.getElementById('install-banner').style.display = 'none';
        });
      }
    }

    // ── Service Worker ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error:', e));
    }

    // ── Notifications ──
    if ('Notification' in window) Notification.requestPermission();

    // ── Branding ──
    async function loadStaffBranding(hotelId) {
      try {
        const res = await fetch('/hotels');
        const hotels = await res.json();
        const data = hotels.find(h => h.hotel_id === hotelId);
        if (data) {
          const color = data.colour;
          document.getElementById('login-hotel-name').textContent = (data.emoji || '🏨') + ' ' + data.name;
          document.getElementById('login-hotel-sub').textContent = (data.city || '') + ' · Staff Portal';
          document.getElementById('login-screen').style.background = `linear-gradient(160deg, ${color}, ${color}cc)`;
        }
      } catch(e) {}
    }

    function switchHotel(hotelId) {
      currentHotelId = hotelId;
      loadStaffBranding(hotelId);
    }

    // ── PIN ──
    function addPin(num) {
      if (pin.length < 4) { pin += num; updateDots(); }
    }
    function deletePin() { pin = pin.slice(0, -1); updateDots(); }
    function clearPin() { pin = ''; updateDots(); }
    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('dot-' + i).classList.toggle('filled', i < pin.length);
      }
    }

    // ── Login ──
    function doLogin() {
      const name = document.getElementById('staff-name').value.trim();
      if (!name) { alert('Please enter your name!'); return; }
      if (pin !== CORRECT_PIN) {
        document.getElementById('login-error').style.display = 'block';
        clearPin(); return;
      }
      loggedInStaff = name;
      currentHotelId = document.getElementById('hotel-select').value;
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      document.getElementById('dash-staff').textContent = '👋 ' + name;
      updateDashBranding(currentHotelId);
      loadTasks();
      setInterval(loadTasks, 5000);
    }

    async function updateDashBranding(hotelId) {
      try {
        const res = await fetch('/hotels');
        const hotels = await res.json();
        const data = hotels.find(h => h.hotel_id === hotelId);
        if (data) {
          document.getElementById('dash-hotel').textContent = (data.emoji || '🏨') + ' ' + data.name;
          document.getElementById('dash-header').style.background = `linear-gradient(90deg, ${data.colour}, ${data.colour}cc)`;
        }
      } catch(e) {}
    }

    function doLogout() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard-screen').style.display = 'none';
      pin = ''; clearPin();
      document.getElementById('staff-name').value = '';
    }

    // ── Notifications check ──
    function checkNewRequests(data) {
      const currentIds = data.map(r => r.id).join(',');
      if (knownRequestIds === null) { knownRequestIds = currentIds; return; }
      if (currentIds !== knownRequestIds) {
        data.filter(r => !knownRequestIds.includes(String(r.id))).forEach(r => {
          if (r.status === 'pending' && Notification.permission === 'granted') {
            new Notification('🔔 New Request — Welco', {
              body: 'Room ' + (r.room_number || r.room_id) + ': ' + r.category + (r.message ? ' — ' + r.message : ''),
              icon: 'https://cdn-icons-png.flaticon.com/512/1257/1257163.png'
            });
          }
        });
        knownRequestIds = currentIds;
      }
    }

    // ── Load Tasks ──
    async function loadTasks() {
      try {
        const res = await fetch('/requests?hotel_id=' + currentHotelId);
        const data = await res.json();
        if (!Array.isArray(data)) return;

        const pending = data.filter(r => r.status === 'pending').length;
        document.getElementById('pending-count').textContent = pending + ' pending';
        checkNewRequests(data);

        const list = document.getElementById('task-list');
        if (data.length === 0) {
          list.innerHTML = '<div class="empty-state">🎉 No requests right now!</div>';
          return;
        }

        list.innerHTML = data.map(r => {
          const SLA = 15;
          const elapsed = (Date.now() - new Date(r.created_at).getTime()) / 60000;
          const remaining = Math.max(0, SLA - elapsed);
          const pct = Math.max(0, (remaining / SLA) * 100);
          const mins = Math.floor(remaining);
          const secs = Math.floor((remaining - mins) * 60);
          const timerClass = pct > 50 ? '' : pct > 25 ? 'warning' : 'urgent';
          const cardClass = r.status === 'done' ? 'done' : pct === 0 ? 'urgent' : '';
          const roomLabel = r.room_number || r.room_id || '—';

          return `
            <div class="task-card ${cardClass}">
              <div class="task-top">
                <span class="task-room">Room ${roomLabel}</span>
                <span class="task-cat">${r.category || 'General'}</span>
              </div>
              <div class="task-msg">${r.message || 'No details'}</div>
              <div class="task-sla">⏱ <span>${r.status === 'done' ? 'Completed' : mins + 'm ' + secs + 's remaining'}</span></div>
              <div class="timer-bar"><div class="timer-fill ${timerClass}" style="width:${r.status === 'done' ? 100 : pct}%"></div></div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                ${r.status === 'pending' ? `<button class="accept-btn" onclick="claimTask(${r.id})" style="background:#0a9396">👋 Accept Task</button>` : ''}
                ${r.status === 'in_progress' ? `<div style="background:#e8f5e9;padding:8px 14px;border-radius:8px;font-size:13px;color:#2e7d32">✅ Accepted by <b>${r.claimed_by || 'staff'}</b></div><button class="accept-btn" onclick="markDone(${r.id})">Mark Done</button>` : ''}
                ${r.status === 'done' ? `<button class="accept-btn" disabled>✅ Completed</button>` : ''}
              </div>
            </div>
          `;
        }).join('');
      } catch(e) { console.log('Load error:', e); }
    }

    async function claimTask(id) {
      await fetch('/requests/' + id + '/claim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ claimed_by: loggedInStaff })
      });
      loadTasks();
    }

    async function markDone(id) {
      await fetch('/requests/' + id + '/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      loadTasks();
    }

    // Init
    loadStaffBranding('hotel_001');
  </script>
</body>
</html>
