<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welco Staff</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a9396">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Welco Staff">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; min-height: 100vh; }

    #login-screen { min-height: 100vh; background: linear-gradient(160deg, #005f73, #0a9396); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .hotel-logo { font-size: 52px; margin-bottom: 8px; text-align: center; }
    .hotel-name { color: white; font-size: 24px; font-weight: bold; margin-bottom: 4px; text-align: center; }
    .hotel-sub { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 32px; text-align: center; }
    .login-card { background: white; border-radius: 20px; padding: 28px; width: 100%; max-width: 340px; }
    .login-card label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .login-card select, .login-card input[type="text"] { width: 100%; padding: 12px 14px; border: 1.5px solid #e0ddd8; border-radius: 10px; font-size: 15px; margin-bottom: 20px; outline: none; background: white; }
    .login-card select:focus, .login-card input:focus { border-color: #0a9396; }
    .pin-label { font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
    .pin-dot.filled { background: #0a9396; }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .pin-btn { padding: 16px; border: none; border-radius: 12px; background: #f5f5f5; font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.15s; }
    .pin-btn:active { background: #0a9396; color: white; transform: scale(0.95); }
    .pin-clear { background: #fde8ea; color: #e63946; }
    .login-btn { width: 100%; padding: 14px; background: #005f73; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-error { color: #e63946; font-size: 13px; text-align: center; margin-top: 10px; display: none; line-height: 1.5; }

    #dashboard-screen { display: none; }
    .dash-header { background: linear-gradient(90deg, #005f73, #0a9396); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
    .dash-hotel { font-size: 17px; font-weight: bold; }
    .dash-staff { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .notif-badge { background: #ee9b00; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .notif-badge.zero { background: rgba(255,255,255,0.2); }
    .logout-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; }

    .filter-tabs { display: flex; background: white; border-bottom: 1px solid #eee; overflow-x: auto; }
    .filter-tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
    .filter-tab.active { color: #005f73; border-bottom-color: #005f73; }

    .dash-container { padding: 14px; max-width: 600px; margin: 0 auto; }
    .section-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 600; }

    .task-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-left: 4px solid #ee9b00; }
    .task-card.urgent { border-left-color: #e63946; }
    .task-card.in-progress { border-left-color: #0a9396; }
    .task-card.done { border-left-color: #2ecc71; opacity: 0.6; }
    .task-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .task-room { font-weight: bold; font-size: 16px; color: #1a1a2e; }
    .task-cat { background: #005f73; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .task-msg { color: #555; font-size: 14px; margin-bottom: 8px; line-height: 1.4; }
    .task-time { font-size: 11px; color: #aaa; margin-bottom: 8px; }
    .timer-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
    .timer-fill { height: 100%; border-radius: 4px; background: #2ecc71; }
    .timer-fill.warning { background: #ee9b00; }
    .timer-fill.urgent { background: #e63946; }
    .task-sla { font-size: 12px; color: #888; margin-bottom: 10px; }
    .task-sla.urgent-text { color: #e63946; font-weight: bold; }
    .task-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-accept { padding: 9px 18px; background: #0a9396; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-done { padding: 9px 18px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-done:disabled { background: #ccc; cursor: default; }
    .claimed-badge { background: #e8f4f4; color: #005f73; padding: 8px 14px; border-radius: 8px; font-size: 13px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .refresh-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .refresh-btn { background: #f0f2f5; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #666; cursor: pointer; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="hotel-logo" id="login-emoji">🏨</div>
  <div class="hotel-name" id="login-hotel-name">Welco Staff</div>
  <div class="hotel-sub" id="login-hotel-sub">Loading hotels...</div>
  <div class="login-card">
    <label>Select Hotel</label>
    <select id="hotel-select" onchange="switchHotel(this.value)">
      <option value="">Loading...</option>
    </select>
    <label>Your Name (exactly as added by manager)</label>
    <input type="text" id="staff-name" placeholder="e.g. Rahul">
    <div class="pin-label">Enter Your PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="addPin('1')">1</button>
      <button class="pin-btn" onclick="addPin('2')">2</button>
      <button class="pin-btn" onclick="addPin('3')">3</button>
      <button class="pin-btn" onclick="addPin('4')">4</button>
      <button class="pin-btn" onclick="addPin('5')">5</button>
      <button class="pin-btn" onclick="addPin('6')">6</button>
      <button class="pin-btn" onclick="addPin('7')">7</button>
      <button class="pin-btn" onclick="addPin('8')">8</button>
      <button class="pin-btn" onclick="addPin('9')">9</button>
      <button class="pin-btn pin-clear" onclick="clearPin()">✕</button>
      <button class="pin-btn" onclick="addPin('0')">0</button>
      <button class="pin-btn" onclick="deletePin()">⌫</button>
    </div>
    <button class="login-btn" onclick="doLogin()">Login to Dashboard</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="dashboard-screen">
  <div class="dash-header" id="dash-header">
    <div>
      <div class="dash-hotel" id="dash-hotel">Welco Staff</div>
      <div class="dash-staff" id="dash-staff">Staff</div>
    </div>
    <div class="header-right">
      <span class="notif-badge" id="pending-count">0 pending</span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="filter-tabs">
    <div class="filter-tab active" onclick="setFilter('all')">All</div>
    <div class="filter-tab" onclick="setFilter('pending')">⏳ Pending</div>
    <div class="filter-tab" onclick="setFilter('in_progress')">🔄 In Progress</div>
    <div class="filter-tab" onclick="setFilter('done')">✅ Done</div>
  </div>

  <div class="dash-container">
    <div class="refresh-row">
      <div class="section-label">Live Requests</div>
      <button class="refresh-btn" onclick="loadTasks()">🔄 Refresh</button>
    </div>
    <div id="task-list"></div>
  </div>
</div>

<script>
var pin = '';
var loggedInStaff = '';
var currentHotelId = '';
var currentFilter = 'all';
var knownRequestIds = null;
var allHotels = [];
var refreshInterval = null;

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
if ('Notification' in window) Notification.requestPermission();

function loadAllHotels() {
  fetch('/hotels').then(function(r){return r.json();}).then(function(hotels){
    allHotels = hotels;
    var select = document.getElementById('hotel-select');
    select.innerHTML = hotels.map(function(h){
      return '<option value="'+h.hotel_id+'">'+(h.emoji||'🏨')+' '+h.name+' — '+(h.city||'')+'</option>';
    }).join('');
    if (hotels.length > 0) { currentHotelId = hotels[0].hotel_id; applyBranding(hotels[0]); }
  }).catch(function(){
    document.getElementById('login-hotel-sub').textContent = 'Staff Portal';
  });
}

function applyBranding(hotel) {
  var color = hotel.colour || '#0a9396';
  document.getElementById('login-emoji').textContent = hotel.emoji || '🏨';
  document.getElementById('login-hotel-name').textContent = hotel.name;
  document.getElementById('login-hotel-sub').textContent = (hotel.city||'') + ' · Staff Portal';
  document.getElementById('login-screen').style.background = 'linear-gradient(160deg, '+color+'dd, '+color+'88)';
}

function switchHotel(hotelId) {
  currentHotelId = hotelId;
  var hotel = allHotels.find(function(h){return h.hotel_id===hotelId;});
  if (hotel) applyBranding(hotel);
}

function addPin(num) { if (pin.length < 4) { pin += num; updateDots(); } }
function deletePin() { pin = pin.slice(0,-1); updateDots(); }
function clearPin() { pin = ''; updateDots(); }
function updateDots() {
  for (var i=0;i<4;i++) document.getElementById('dot-'+i).classList.toggle('filled', i<pin.length);
}

function doLogin() {
  var name = document.getElementById('staff-name').value.trim();
  if (!name) { showLoginErr('Please enter your name.'); return; }
  if (!currentHotelId) { showLoginErr('Please select a hotel.'); return; }
  if (pin.length !== 4) { showLoginErr('Please enter your 4-digit PIN.'); return; }

  var btn = document.querySelector('.login-btn');
  btn.textContent = 'Verifying...';
  btn.disabled = true;

  fetch('/staff/verify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({hotel_id: currentHotelId, name: name, pin: pin})
  }).then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
  .then(function(res){
    btn.textContent = 'Login to Dashboard';
    btn.disabled = false;
    if (!res.ok) { showLoginErr(res.d.error || 'Invalid name or PIN.'); clearPin(); return; }
    loggedInStaff = name;
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    document.getElementById('dash-staff').textContent = '👋 ' + name;
    var hotel = allHotels.find(function(h){return h.hotel_id===currentHotelId;});
    if (hotel) {
      var color = hotel.colour || '#0a9396';
      document.getElementById('dash-hotel').textContent = (hotel.emoji||'🏨')+' '+hotel.name;
      document.getElementById('dash-header').style.background = 'linear-gradient(90deg, '+color+'dd, '+color+'88)';
    }
    loadTasks();
    refreshInterval = setInterval(loadTasks, 5000);
  }).catch(function(){
    btn.textContent = 'Login to Dashboard';
    btn.disabled = false;
    showLoginErr('Connection error. Try again.');
  });
}

function showLoginErr(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

function doLogout() {
  clearInterval(refreshInterval);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
  pin = ''; clearPin();
  document.getElementById('staff-name').value = '';
  knownRequestIds = null;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(function(t,i){
    t.classList.toggle('active', ['all','pending','in_progress','done'][i]===f);
  });
  loadTasks();
}

function checkNewRequests(data) {
  var currentIds = data.map(function(r){return r.id;}).join(',');
  if (knownRequestIds === null) { knownRequestIds = currentIds; return; }
  if (currentIds !== knownRequestIds) {
    data.forEach(function(r){
      if (r.status==='pending' && !knownRequestIds.includes(String(r.id)) && Notification.permission==='granted') {
        new Notification('🔔 New Request', {
          body: 'Room '+(r.room_number||'?')+': '+(r.category||'')+' — '+(r.message||''),
          icon: 'https://cdn-icons-png.flaticon.com/512/1257/1257163.png'
        });
      }
    });
    knownRequestIds = currentIds;
  }
}

function loadTasks() {
  fetch('/requests?hotel_id='+currentHotelId).then(function(r){return r.json();}).then(function(data){
    if (!Array.isArray(data)) return;
    var pending = data.filter(function(r){return r.status==='pending';}).length;
    var badge = document.getElementById('pending-count');
    badge.textContent = pending+' pending';
    badge.className = 'notif-badge'+(pending===0?' zero':'');
    checkNewRequests(data);
    var filtered = currentFilter==='all' ? data : data.filter(function(r){return r.status===currentFilter;});
    var list = document.getElementById('task-list');
    if (filtered.length===0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>'+(currentFilter==='all'?'No requests yet!':'No '+currentFilter.replace('_',' ')+' requests')+'</p></div>';
      return;
    }
    list.innerHTML = filtered.map(function(r){
      var SLA=15;
      var elapsed=(Date.now()-new Date(r.created_at).getTime())/60000;
      var remaining=Math.max(0,SLA-elapsed);
      var pct=Math.max(0,(remaining/SLA)*100);
      var mins=Math.floor(remaining);
      var secs=Math.floor((remaining-mins)*60);
      var timerClass=pct>50?'':pct>25?'warning':'urgent';
      var cardClass=r.status==='done'?'done':r.status==='in_progress'?'in-progress':pct===0?'urgent':'';
      var timeAgo=Math.floor(elapsed)>0?Math.floor(elapsed)+'m ago':'Just now';
      var actionsHtml='';
      if (r.status==='pending') actionsHtml='<button class="btn-accept" onclick="claimTask('+r.id+')">👋 Accept</button>';
      else if (r.status==='in_progress') actionsHtml='<span class="claimed-badge">✅ '+(r.claimed_by||'Staff')+'</span><button class="btn-done" onclick="markDone('+r.id+')">Mark Done ✓</button>';
      else actionsHtml='<button class="btn-done" disabled>✅ Completed</button>';
      return '<div class="task-card '+cardClass+'">'+
        '<div class="task-top"><span class="task-room">Room '+(r.room_number||'?')+'</span><span class="task-cat">'+(r.category||'General')+'</span></div>'+
        '<div class="task-msg">'+(r.message||'No details')+'</div>'+
        '<div class="task-time">🕐 '+timeAgo+'</div>'+
        (r.status!=='done'?'<div class="task-sla'+(pct<25?' urgent-text':'')+'">⏱ '+mins+'m '+secs+'s remaining</div>'+
        '<div class="timer-bar"><div class="timer-fill '+timerClass+'" style="width:'+pct+'%"></div></div>':'')+
        '<div class="task-actions">'+actionsHtml+'</div></div>';
    }).join('');
  }).catch(function(){});
}

function claimTask(id) {
  fetch('/requests/'+id+'/claim',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({claimed_by:loggedInStaff})})
    .then(function(r){return r.json();}).then(function(data){
      if (data.error) { alert('Error: '+data.error); return; }
      loadTasks();
    }).catch(function(){ alert('Connection error'); });
}

function markDone(id) {
  fetch('/requests/'+id+'/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})})
    .then(function(){ loadTasks(); });
}

loadAllHotels();
</script>
</body>
</html>
